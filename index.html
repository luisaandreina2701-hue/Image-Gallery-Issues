<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images of Christ</title>
    <style>
        body {
            background: rgb(230, 230, 190);
        }

        #wrapper {
            width: 600px;
            margin: 0 auto;
        }

        nav {
            color: white;
            text-align: center;
            font-family: Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }

        #gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border: 15px solid rgb(255, 255, 255);
            width: 100%;
            background-color: #ddd;
            background-image:
                linear-gradient(45deg, #ccc 26%, transparent 26%),
                linear-gradient(135deg, #ccc 26%, transparent 26%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(135deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 0, 10px -10px, 0px 10px;

        }

        #gallery a {
            cursor: url('images/christus.png'), pointer;
        }

        #gallery img {
            width: 200px;
            height: 300px;
            opacity: 0.7;
            display: block;
            transition: all 0.4s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
            border-radius: 8px;
        }

        #gallery img:hover {
            opacity: 1;
            transform: scale(1.08);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <nav>
            <h1>Christ Art Gallery</h1>
        </nav>
        <main>
            <div id="gallery">
                <a href="images/small/img1.jpg"><img src="images/small/img1.jpg" alt="huge file size"></a>
                <a href="images/small/img2.jpg"><img src="images/small/img2.jpg" alt="huge file size"></a>
                <a href="images/small/img3.jpg"><img src="images/small/img3.jpg" alt="huge file size"></a>
                <a href="images/small/img4.jpg"><img src="images/small/img4.jpg" alt="huge file size"></a>
                <a href="images/small/img5.jpg"><img src="images/small/img5.jpg" alt="huge file size"></a>
                <a href="images/small/img6.jpg"><img src="images/small/img6.jpg" alt="huge file size"></a>
            </div>
        </main>
    </div>
</body>

</html>
